version: 1
extends: ../papers.yml
project:
  id: scipy-2025-drivendata
  # Ensure your title is the same as in your `main.md`
  title: "Zamba: Computer vision for wildlife conservation"
  # subtitle:
  description: We present Zamba, an open source Python package designed to streamline camera trap data processing through machine learning. Zamba supports inference and custom model training for species classification on videos and images, as well as depth estimation inference for videos.
  # Authors should have affiliations, emails and ORCIDs if available
  authors:
    - name: Emily Dorne
      email: emily@drivendata.org
      orcid: 0009-0004-6185-7611
      affiliations:
        - DrivenData
      roles:
        - Methodology
        - Software
        - Supervision
        - Visualization
        - Writing - original draft
    - name: Jay Qi
      email: jay@drivendata.org
      orcid: 0009-0000-9154-393X
      affiliations:
        - DrivenData
      roles:
        - Methodology
        - Software
        - Visualization
        - Writing - original draft
    - name: Peter Bull
      email: peter@drivendata.org
      affiliations:
        - DrivenData
      roles:
        - Methodology
        - Software
        - Supervision
        - Visualization
        - Writing - review & editing
    - name: Hjalmar S. Kühl
      affiliations:
        - Max Planck Institute for Evolutionary Anthropology
    - name: Mimi Arandjelovic
      orcid: 0000-0001-8920-9684
      affiliations:
        - Max Planck Institute for Evolutionary Anthropology

  keywords:
    - camera traps
    - computer vision
    - machine learning
    - wildlife conservation
    - distance sampling
  # Add the abbreviations that you use in your paper here
  abbreviations:
    MPI-EVA: Max Planck Institute for Evolutionary Anthropology
    ML: Machine learning
    CNN: Convolutional neural network
  # It is possible to explicitly ignore the `doi-exists` check for certain citation keys
  error_rules:
    - rule: doi-exists
      severity: ignore
      keys:
        - primatrix_competition
        - primatrix_results
        - deepchimpact_competition
        - fastai_timedistributed
        - lila_bc
  exports:
    - id: pdf
      format: typst
      template: https://github.com/curvenote-templates/scipy.git
      article: main.md
      output: full_text.pdf
